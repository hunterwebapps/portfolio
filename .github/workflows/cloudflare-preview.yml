name: Deploy preview to Cloudflare Pages

on:
  push:
    branches-ignore:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    name: Deploy preview
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: cf
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Summarize preview URL
        if: success()
        run: |
          echo "### Cloudflare Pages preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment URL: ${{ steps.cf.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch alias URL: ${{ steps.cf.outputs.pages-deployment-alias-url }}" >> "$GITHUB_STEP_SUMMARY"
